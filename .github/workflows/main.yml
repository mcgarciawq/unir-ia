name: CI/CD Task Manager API - ACR + ACA + Azure SQL

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PORT: "8000"
  IMAGE_TAG: ${{ github.sha }}
  ACA_API_VERSION: "2025-07-01"
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  IMAGE_REPOSITORY: ${{ secrets.IMAGE_REPOSITORY }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_BEARER_TOKEN: ${{ secrets.AZURE_BEARER_TOKEN }}
  AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
  AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
  AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
  AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
  AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
  AZURE_OPENAI_MAX_TOKENS: ${{ secrets.AZURE_OPENAI_MAX_TOKENS }}
  AZURE_OPENAI_TEMPERATURE: ${{ secrets.AZURE_OPENAI_TEMPERATURE }}
  AZURE_OPENAI_TOP_P: ${{ secrets.AZURE_OPENAI_TOP_P }}
  AZURE_OPENAI_SUPPORTED_PARAMS: ${{ secrets.AZURE_OPENAI_SUPPORTED_PARAMS }}

jobs:
  validate-config:
    name: Validate configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            RESOURCE_GROUP CONTAINER_APP_NAME ACR_LOGIN_SERVER
            ACR_USERNAME ACR_PASSWORD IMAGE_REPOSITORY
            AZURE_SUBSCRIPTION_ID AZURE_BEARER_TOKEN
            AZURE_SQL_CONNECTION_STRING
            AZURE_OPENAI_API_KEY AZURE_OPENAI_ENDPOINT AZURE_OPENAI_DEPLOYMENT_NAME
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Falta el secret $name"
              exit 1
            fi
          done

  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - validate-config
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to ACR
        shell: bash
        run: |
          set -euo pipefail
          echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" \
            --username "$ACR_USERNAME" --password-stdin

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG"
          IMAGE_LATEST="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:latest"
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          echo "IMAGE_SHA=$IMAGE_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=$IMAGE_LATEST" >> "$GITHUB_ENV"

      - name: Smoke test Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker rm -f uniria-smoke-test >/dev/null 2>&1 || true
          docker run -d \
            --name uniria-smoke-test \
            -p 8000:8000 \
            -e DATABASE_URL=sqlite:////tmp/uniria-smoke.db \
            -e SKIP_RAG_INIT=true \
            "$IMAGE_SHA"
          trap 'docker logs uniria-smoke-test || true; docker rm -f uniria-smoke-test >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::La imagen Docker no respondió correctamente en /health"
          exit 1

      - name: Push Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push
    outputs:
      app_url: ${{ steps.wait_aca.outputs.app_url }}

    steps:
      - name: Set image name
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_SHA=$IMAGE_SHA" >> "$GITHUB_ENV"

      - name: Read current Container App through REST
        shell: bash
        run: |
          set -euo pipefail
          ACA_URL="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/containerApps/${CONTAINER_APP_NAME}?api-version=${ACA_API_VERSION}"
          HTTP_CODE=$(curl -sS -o aca_current.json -w "%{http_code}" \
            -H "Authorization: Bearer ${AZURE_BEARER_TOKEN}" "$ACA_URL")
          case "$HTTP_CODE" in
            200) echo "Container App encontrada" ;;
            401) echo "::error::AZURE_BEARER_TOKEN ha caducado"; exit 1 ;;
            403) echo "::error::El token no tiene permisos sobre ACA"; exit 1 ;;
            404) echo "::error::No existe la Container App indicada"; exit 1 ;;
            *) cat aca_current.json; exit 1 ;;
          esac
          echo "ACA_URL=$ACA_URL" >> "$GITHUB_ENV"

      - name: Generate deployment payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os
          from copy import deepcopy

          with open("aca_current.json", encoding="utf-8") as f:
              current = json.load(f)

          props = current.get("properties", {})
          environment_id = props.get("environmentId") or props.get("managedEnvironmentId")
          if not environment_id:
              raise SystemExit("No se pudo obtener environmentId de ACA")

          template = deepcopy(props.get("template") or {})
          configuration = deepcopy(props.get("configuration") or {})
          containers = template.get("containers") or []
          container = deepcopy(containers[0]) if containers else {}
          container["name"] = container.get("name") or os.environ["CONTAINER_APP_NAME"]
          image_sha = os.environ.get("IMAGE_SHA")
          if not image_sha:
              raise SystemExit("No se pudo calcular IMAGE_SHA para el despliegue")
          container["image"] = image_sha

          openai_version = os.environ.get("AZURE_OPENAI_API_VERSION") or "2024-02-15-preview"
          container_env = [
              {"name": "APP_ENV", "value": "azure"},
              {"name": "AZURE_SQL_CONNECTION_STRING", "secretRef": "azure-sql-connection-string"},
              {"name": "AZURE_OPENAI_API_KEY", "secretRef": "azure-openai-api-key"},
              {"name": "AZURE_OPENAI_ENDPOINT", "secretRef": "azure-openai-endpoint"},
              {"name": "AZURE_OPENAI_DEPLOYMENT_NAME", "secretRef": "azure-openai-deployment-name"},
              {"name": "AZURE_OPENAI_API_VERSION", "value": openai_version},
          ]
          optional_secret_env = {
              "AZURE_OPENAI_MAX_TOKENS": "azure-openai-max-tokens",
              "AZURE_OPENAI_TEMPERATURE": "azure-openai-temperature",
              "AZURE_OPENAI_TOP_P": "azure-openai-top-p",
              "AZURE_OPENAI_SUPPORTED_PARAMS": "azure-openai-supported-params",
          }
          for env_name, secret_name in optional_secret_env.items():
              if os.environ.get(env_name):
                  container_env.append({"name": env_name, "secretRef": secret_name})
          container["env"] = container_env
          container.setdefault("resources", {"cpu": 0.5, "memory": "1Gi"})

          template.pop("revisionSuffix", None)
          template["containers"] = [container]
          template.setdefault("scale", {"minReplicas": 0, "maxReplicas": 1})

          ingress = deepcopy(configuration.get("ingress") or {})
          ingress.pop("fqdn", None)
          ingress.pop("exposedPort", None)
          ingress.update({
              "external": True,
              "targetPort": int(os.environ["PORT"]),
              "transport": "auto",
              "allowInsecure": False,
              "traffic": [{"latestRevision": True, "weight": 100}],
          })

          configuration["activeRevisionsMode"] = "Single"
          configuration["ingress"] = ingress

          # Azure does not return secret values in GET responses. Re-sending those
          # name-only secrets in a full PUT makes the deployment fail validation.
          secrets = [
              {"name": "acr-password", "value": os.environ["ACR_PASSWORD"]},
              {"name": "azure-sql-connection-string", "value": os.environ["AZURE_SQL_CONNECTION_STRING"]},
              {"name": "azure-openai-api-key", "value": os.environ["AZURE_OPENAI_API_KEY"]},
              {"name": "azure-openai-endpoint", "value": os.environ["AZURE_OPENAI_ENDPOINT"]},
              {"name": "azure-openai-deployment-name", "value": os.environ["AZURE_OPENAI_DEPLOYMENT_NAME"]},
          ]
          for env_name, secret_name in optional_secret_env.items():
              if os.environ.get(env_name):
                  secrets.append({"name": secret_name, "value": os.environ[env_name]})
          configuration["secrets"] = secrets

          registries = [
              r for r in (configuration.get("registries") or [])
              if r.get("server") != os.environ["ACR_LOGIN_SERVER"]
          ]
          registries.append({
              "server": os.environ["ACR_LOGIN_SERVER"],
              "username": os.environ["ACR_USERNAME"],
              "passwordSecretRef": "acr-password",
          })
          configuration["registries"] = registries

          payload = {
              "location": current["location"],
              "properties": {
                  "environmentId": environment_id,
                  "configuration": configuration,
                  "template": template,
              },
          }
          if current.get("identity"):
              payload["identity"] = current["identity"]
          if current.get("tags"):
              payload["tags"] = current["tags"]

          with open("aca_deployment.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)
          PY

      - name: Deploy new ACA revision
        shell: bash
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -sS -o aca_put_response.json -w "%{http_code}" \
            -X PUT "$ACA_URL" \
            -H "Authorization: Bearer ${AZURE_BEARER_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @aca_deployment.json)
          case "$HTTP_CODE" in
            200|201|202) echo "Despliegue aceptado: HTTP $HTTP_CODE" ;;
            *) cat aca_put_response.json; exit 1 ;;
          esac

      - name: Wait for ACA provisioning
        id: wait_aca
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            curl -sS -H "Authorization: Bearer ${AZURE_BEARER_TOKEN}" \
              "$ACA_URL" -o aca_status.json
            STATE=$(python -c "import json; print(json.load(open('aca_status.json')).get('properties',{}).get('provisioningState',''))")
            FQDN=$(python -c "import json; print(json.load(open('aca_status.json')).get('properties',{}).get('configuration',{}).get('ingress',{}).get('fqdn',''))")
            if [ "$STATE" = "Succeeded" ] && [ -n "$FQDN" ]; then
              APP_URL="https://$FQDN"
              echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"
              echo "APP_URL=$APP_URL" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 10
          done
          echo "::error::La Container App no llegó a estado Succeeded con FQDN disponible"
          cat aca_status.json
          exit 1

  validate-deployment:
    name: Validate deployed app
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy

    env:
      APP_URL: ${{ needs.deploy.outputs.app_url }}

    steps:
      - name: Set image name
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_SHA=$IMAGE_SHA" >> "$GITHUB_ENV"

      - name: Resolve app URL
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ]; then
            ACA_URL="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/containerApps/${CONTAINER_APP_NAME}?api-version=${ACA_API_VERSION}"
            curl -sS -H "Authorization: Bearer ${AZURE_BEARER_TOKEN}" "$ACA_URL" -o aca_status.json
            FQDN=$(python -c "import json; print(json.load(open('aca_status.json')).get('properties',{}).get('configuration',{}).get('ingress',{}).get('fqdn',''))")
            if [ -z "$FQDN" ]; then
              echo "::error::No se pudo resolver el FQDN de la Container App"
              cat aca_status.json
              exit 1
            fi
            APP_URL="https://$FQDN"
            echo "APP_URL=$APP_URL" >> "$GITHUB_ENV"
          fi
          echo "APP_URL resuelta: $APP_URL"

      - name: Validate public endpoints
        shell: bash
        run: |
          set -euo pipefail
          call_endpoint() {
            local path="$1"
            local body_file="$2"
            local error_file="$3"
            : > "$body_file"
            : > "$error_file"
            curl --connect-timeout 20 --max-time 60 -sS \
              -o "$body_file" -w "%{http_code}" "$APP_URL$path" \
              2> "$error_file" || true
          }

          echo "Validando aplicación en $APP_URL"
          for attempt in $(seq 1 30); do
            HEALTH_CODE=$(call_endpoint "/health" health_response.txt health_error.txt)
            DB_CODE=$(call_endpoint "/health/db" db_response.txt db_error.txt)
            TASKS_CODE=$(call_endpoint "/tasks/" tasks_response.txt tasks_error.txt)
            STORIES_CODE=$(call_endpoint "/user-stories/json" stories_response.txt stories_error.txt)
            echo "Intento $attempt: /health HTTP $HEALTH_CODE, /health/db HTTP $DB_CODE, /tasks/ HTTP $TASKS_CODE, /user-stories/json HTTP $STORIES_CODE"
            if [[ "$HEALTH_CODE" =~ ^2[0-9][0-9]$ && "$DB_CODE" =~ ^2[0-9][0-9]$ && "$TASKS_CODE" =~ ^2[0-9][0-9]$ && "$STORIES_CODE" =~ ^2[0-9][0-9]$ ]]; then
              break
            fi
            sleep 10
          done

          if ! [[ "$HEALTH_CODE" =~ ^2[0-9][0-9]$ ]]; then
            echo "::error::/health no respondió correctamente. Última respuesta HTTP $HEALTH_CODE"
            cat health_error.txt
            cat health_response.txt
            exit 1
          fi
          if ! [[ "$DB_CODE" =~ ^2[0-9][0-9]$ ]]; then
            echo "::error::/health/db no respondió correctamente. Última respuesta HTTP $DB_CODE"
            cat db_error.txt
            cat db_response.txt
            exit 1
          fi
          if ! [[ "$TASKS_CODE" =~ ^2[0-9][0-9]$ ]]; then
            echo "::error::/tasks/ no respondió correctamente. Última respuesta HTTP $TASKS_CODE"
            cat tasks_error.txt
            cat tasks_response.txt
            exit 1
          fi
          if ! [[ "$STORIES_CODE" =~ ^2[0-9][0-9]$ ]]; then
            echo "::error::/user-stories/json no respondió correctamente. Última respuesta HTTP $STORIES_CODE"
            cat stories_error.txt
            cat stories_response.txt
            exit 1
          fi

      - name: Write deployment summary
        shell: bash
        run: |
          set -euo pipefail
          echo "### Despliegue completado" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $APP_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Imagen: $IMAGE_SHA" >> "$GITHUB_STEP_SUMMARY"
