name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t uniria:ci-${{ github.sha }} .

      - name: Save image as artifact
        run: |
          docker save uniria:ci-${{ github.sha }} | gzip > uniria_image_${{ github.sha }}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: uniria-image
          path: uniria_image_${{ github.sha }}.tar.gz

  test:
    name: Run tests inside the container
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: uniria-image
          path: ./

      - name: Load Docker image
        run: |
          gunzip -c uniria_image_${{ github.sha }}.tar.gz | docker load

      - name: Run tests inside the container
        run: |
          docker run --rm \
            -e SQLALCHEMY_DATABASE_URI='sqlite:///:memory:' \
            uniria:ci-${{ github.sha }} \
            pytest -q

  push:
    name: Push image to ACR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: uniria-image
          path: ./

      - name: Load Docker image
        run: |
          gunzip -c uniria_image_${{ github.sha }}.tar.gz | docker load

      - name: Tag and push to ACR
        run: |
          docker tag uniria:ci-${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/uniria:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/uniria:latest
